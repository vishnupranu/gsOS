apiVersion: v1
kind: Namespace
metadata:
  name: aios
  labels:
    name: aios
---
apiVersion: v1
kind: Secret
metadata:
  name: aios-secrets
  namespace: aios
type: Opaque
stringData:
  database-url: postgresql://user:password@postgres:5432/aios
  redis-url: redis://redis:6379
  jwt-secret: your-jwt-secret-here
  openai-api-key: sk-your-openai-key
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aios-config
  namespace: aios
data:
  NODE_ENV: production
  PORT: "3001"
  REDIS_URL: redis://redis:6379